<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
        <meta name="theme-color" content="#0a0a0f" />
        <meta name="apple-mobile-web-app-capable" content="yes" />
        <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
        <title>Mana Hub</title>
        <link rel="preconnect" href="https://fonts.googleapis.com" />
        <link
            href="https://fonts.googleapis.com/css2?family=Syne:wght@400;500;600;700;800&family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600;1,9..40,300&display=swap"
            rel="stylesheet"
        />
        <style>
            :root {
                --bg: #06060f;
                --bg2: #0d0d1a;
                --bg3: #13131f;
                --surface: rgba(255, 255, 255, 0.04);
                --surface2: rgba(255, 255, 255, 0.07);
                --border: rgba(255, 255, 255, 0.08);
                --border2: rgba(255, 255, 255, 0.12);
                --accent: #6c63ff;
                --accent2: #a78bfa;
                --accent3: #38bdf8;
                --green: #22d3a5;
                --red: #f87171;
                --orange: #fb923c;
                --yellow: #fbbf24;
                --text: #f0f0ff;
                --text2: rgba(240, 240, 255, 0.6);
                --text3: rgba(240, 240, 255, 0.35);
                --glass: rgba(13, 13, 26, 0.7);
                --glass2: rgba(20, 20, 40, 0.85);
                --shadow: 0 8px 32px rgba(0, 0, 0, 0.5);
                --shadow2: 0 2px 12px rgba(0, 0, 0, 0.3);
                --radius: 20px;
                --radius2: 14px;
                --radius3: 10px;
                --font: "DM Sans", sans-serif;
                --font2: "Syne", sans-serif;
                --nav-h: 72px;
                --top-h: 60px;
            }
            *,
            *::before,
            *::after {
                box-sizing: border-box;
                margin: 0;
                padding: 0;
                -webkit-tap-highlight-color: transparent;
            }
            html {
                font-size: 16px;
                scroll-behavior: smooth;
            }
            body {
                font-family: var(--font);
                background: var(--bg);
                color: var(--text);
                min-height: 100vh;
                overflow-x: hidden;
                -webkit-font-smoothing: antialiased;
            }

            /* ============ ANIMATED BG ============ */
            .bg-mesh {
                position: fixed;
                inset: 0;
                z-index: 0;
                pointer-events: none;
                background: radial-gradient(ellipse 80% 60% at 20% 20%, rgba(108, 99, 255, 0.12) 0%, transparent 60%),
                    radial-gradient(ellipse 60% 80% at 80% 80%, rgba(56, 189, 248, 0.08) 0%, transparent 60%),
                    radial-gradient(ellipse 50% 50% at 50% 50%, rgba(34, 211, 165, 0.05) 0%, transparent 70%), var(--bg);
            }
            .bg-orb {
                position: fixed;
                border-radius: 50%;
                filter: blur(80px);
                pointer-events: none;
                z-index: 0;
                animation: orbFloat 8s ease-in-out infinite;
            }
            .bg-orb1 {
                width: 300px;
                height: 300px;
                background: rgba(108, 99, 255, 0.15);
                top: -100px;
                right: -50px;
                animation-delay: 0s;
            }
            .bg-orb2 {
                width: 200px;
                height: 200px;
                background: rgba(56, 189, 248, 0.1);
                bottom: 100px;
                left: -80px;
                animation-delay: -3s;
            }
            @keyframes orbFloat {
                0%,
                100% {
                    transform: translateY(0) scale(1);
                }
                50% {
                    transform: translateY(-30px) scale(1.1);
                }
            }

            /* ============ APP WRAPPER ============ */
            #app {
                position: relative;
                z-index: 1;
                min-height: 100vh;
            }

            /* ============ LOGIN ============ */
            #login-screen {
                position: fixed;
                inset: 0;
                z-index: 1000;
                display: flex;
                align-items: center;
                justify-content: center;
                background: radial-gradient(ellipse 100% 100% at 50% 0%, rgba(108, 99, 255, 0.2) 0%, var(--bg) 70%);
                padding: 20px;
            }
            .login-card {
                width: 100%;
                max-width: 380px;
                background: rgba(13, 13, 26, 0.85);
                backdrop-filter: blur(40px);
                border: 1px solid var(--border2);
                border-radius: 28px;
                padding: 40px 32px;
                box-shadow:
                    0 40px 80px rgba(0, 0, 0, 0.6),
                    inset 0 1px 0 rgba(255, 255, 255, 0.1);
                animation: cardIn 0.6s cubic-bezier(0.34, 1.56, 0.64, 1);
            }
            @keyframes cardIn {
                from {
                    opacity: 0;
                    transform: translateY(40px) scale(0.95);
                }
                to {
                    opacity: 1;
                    transform: translateY(0) scale(1);
                }
            }
            .login-logo {
                display: flex;
                align-items: center;
                gap: 10px;
                margin-bottom: 32px;
            }
            .login-logo-icon {
                width: 44px;
                height: 44px;
                border-radius: 14px;
                background: linear-gradient(135deg, var(--accent), var(--accent3));
                display: flex;
                align-items: center;
                justify-content: center;
                box-shadow: 0 8px 24px rgba(108, 99, 255, 0.4);
            }
            .login-logo-text {
                font-family: var(--font2);
                font-size: 22px;
                font-weight: 700;
            }
            .login-logo-text span {
                color: var(--accent2);
            }
            .login-tagline {
                font-size: 13px;
                color: var(--text3);
                margin-bottom: 28px;
                font-weight: 300;
            }
            .login-title {
                font-family: var(--font2);
                font-size: 26px;
                font-weight: 700;
                margin-bottom: 8px;
            }
            .login-sub {
                font-size: 14px;
                color: var(--text2);
                margin-bottom: 28px;
            }
            .input-group {
                margin-bottom: 16px;
                position: relative;
            }
            .input-group label {
                font-size: 12px;
                font-weight: 500;
                color: var(--text2);
                letter-spacing: 0.5px;
                text-transform: uppercase;
                display: block;
                margin-bottom: 8px;
            }
            .input-group input {
                width: 100%;
                padding: 14px 48px 14px 16px;
                background: var(--surface2);
                border: 1px solid var(--border);
                border-radius: var(--radius3);
                color: var(--text);
                font-family: var(--font);
                font-size: 15px;
                outline: none;
                transition: all 0.2s;
            }
            .input-group input:focus {
                border-color: var(--accent);
                background: rgba(108, 99, 255, 0.08);
                box-shadow: 0 0 0 3px rgba(108, 99, 255, 0.15);
            }
            .input-icon {
                position: absolute;
                right: 14px;
                bottom: 14px;
                color: var(--text3);
                cursor: pointer;
                transition: color 0.2s;
            }
            .input-icon:hover {
                color: var(--accent2);
            }
            .login-btn {
                width: 100%;
                padding: 15px;
                margin-top: 8px;
                background: linear-gradient(135deg, var(--accent), #8b5cf6);
                border: none;
                border-radius: var(--radius3);
                color: #fff;
                font-family: var(--font);
                font-size: 15px;
                font-weight: 600;
                cursor: pointer;
                transition: all 0.3s;
                box-shadow: 0 8px 24px rgba(108, 99, 255, 0.4);
                letter-spacing: 0.3px;
                position: relative;
                overflow: hidden;
            }
            .login-btn:active {
                transform: scale(0.98);
            }
            .login-btn.loading::after {
                content: "";
                position: absolute;
                inset: 0;
                background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.2), transparent);
                animation: shimmer 1s infinite;
            }
            .remember-row {
                display: flex;
                align-items: center;
                gap: 8px;
                margin-bottom: 20px;
            }
            .remember-row input[type="checkbox"] {
                width: 16px;
                height: 16px;
                accent-color: var(--accent);
                cursor: pointer;
            }
            .remember-row label {
                font-size: 13px;
                color: var(--text2);
                cursor: pointer;
            }
            .login-error {
                background: rgba(248, 113, 113, 0.12);
                border: 1px solid rgba(248, 113, 113, 0.3);
                border-radius: var(--radius3);
                padding: 10px 14px;
                font-size: 13px;
                color: var(--red);
                margin-bottom: 14px;
                display: none;
                animation: shake 0.4s ease;
            }
            @keyframes shake {
                0%,
                100% {
                    transform: translateX(0);
                }
                20% {
                    transform: translateX(-8px);
                }
                40% {
                    transform: translateX(8px);
                }
                60% {
                    transform: translateX(-5px);
                }
                80% {
                    transform: translateX(5px);
                }
            }

            /* ============ TOP BAR ============ */
            #topbar {
                position: fixed;
                top: 0;
                left: 0;
                right: 0;
                z-index: 100;
                height: var(--top-h);
                background: rgba(6, 6, 15, 0.75);
                backdrop-filter: blur(24px);
                border-bottom: 1px solid var(--border);
                display: flex;
                align-items: center;
                justify-content: space-between;
                padding: 0 16px;
            }
            .topbar-logo {
                display: flex;
                align-items: center;
                gap: 8px;
            }
            .topbar-logo-icon {
                width: 32px;
                height: 32px;
                border-radius: 10px;
                background: linear-gradient(135deg, var(--accent), var(--accent3));
                display: flex;
                align-items: center;
                justify-content: center;
            }
            .topbar-logo-text {
                font-family: var(--font2);
                font-size: 18px;
                font-weight: 700;
            }
            .topbar-logo-text span {
                color: var(--accent2);
            }
            .topbar-right {
                display: flex;
                align-items: center;
                gap: 10px;
            }
            .topbar-badge {
                display: flex;
                align-items: center;
                gap: 6px;
                padding: 6px 12px;
                background: var(--surface);
                border: 1px solid var(--border);
                border-radius: 20px;
                font-size: 12px;
                color: var(--text2);
            }
            .status-dot {
                width: 6px;
                height: 6px;
                border-radius: 50%;
                background: var(--green);
                animation: pulse 2s infinite;
            }
            @keyframes pulse {
                0%,
                100% {
                    opacity: 1;
                }
                50% {
                    opacity: 0.4;
                }
            }
            .topbar-btn {
                width: 36px;
                height: 36px;
                border-radius: 10px;
                background: var(--surface);
                border: 1px solid var(--border);
                display: flex;
                align-items: center;
                justify-content: center;
                cursor: pointer;
                color: var(--text2);
                transition: all 0.2s;
            }
            .topbar-btn:active {
                background: var(--surface2);
            }

            /* ============ BOTTOM NAV ============ */
            #bottom-nav {
                position: fixed;
                bottom: 0;
                left: 0;
                right: 0;
                z-index: 100;
                height: var(--nav-h);
                background: rgba(6, 6, 15, 0.85);
                backdrop-filter: blur(30px);
                border-top: 1px solid var(--border);
                display: flex;
                align-items: center;
                justify-content: space-around;
                padding: 0 4px;
                padding-bottom: env(safe-area-inset-bottom, 0);
            }
            .nav-item {
                flex: 1;
                display: flex;
                flex-direction: column;
                align-items: center;
                justify-content: center;
                gap: 4px;
                padding: 8px 4px;
                cursor: pointer;
                border-radius: var(--radius3);
                transition: all 0.25s;
                color: var(--text3);
                position: relative;
            }
            .nav-item.active {
                color: var(--accent2);
            }
            .nav-item.active .nav-bg {
                position: absolute;
                inset: 4px;
                border-radius: 10px;
                background: rgba(108, 99, 255, 0.12);
                border: 1px solid rgba(108, 99, 255, 0.2);
            }
            .nav-icon {
                position: relative;
                z-index: 1;
            }
            .nav-label {
                font-size: 10px;
                font-weight: 500;
                letter-spacing: 0.2px;
                position: relative;
                z-index: 1;
            }
            .nav-dot {
                width: 4px;
                height: 4px;
                border-radius: 50%;
                background: var(--accent);
                position: absolute;
                top: 4px;
                right: 8px;
            }

            /* ============ PAGES ============ */
            .page {
                display: none;
                padding: calc(var(--top-h) + 16px) 16px calc(var(--nav-h) + 20px);
                min-height: 100vh;
            }
            .page.active {
                display: block;
                animation: pageIn 0.35s cubic-bezier(0.25, 0.46, 0.45, 0.94);
            }
            @keyframes pageIn {
                from {
                    opacity: 0;
                    transform: translateY(12px);
                }
                to {
                    opacity: 1;
                    transform: translateY(0);
                }
            }

            /* ============ SECTION HEADERS ============ */
            .section-header {
                display: flex;
                align-items: center;
                justify-content: space-between;
                margin-bottom: 16px;
                margin-top: 24px;
            }
            .section-title {
                font-family: var(--font2);
                font-size: 18px;
                font-weight: 700;
            }
            .section-action {
                font-size: 13px;
                color: var(--accent2);
                cursor: pointer;
            }

            /* ============ HERO CARD ============ */
            .hero-card {
                border-radius: 24px;
                padding: 24px;
                margin-bottom: 20px;
                position: relative;
                overflow: hidden;
                background: linear-gradient(135deg, #1a0a3e 0%, #0d1a3a 50%, #0a2a1a 100%);
                border: 1px solid rgba(108, 99, 255, 0.2);
                min-height: 160px;
            }
            .hero-card::before {
                content: "";
                position: absolute;
                inset: 0;
                background: url("https://images.unsplash.com/photo-1558618666-fcd25c85cd64?w=800&q=80") center/cover
                    no-repeat;
                opacity: 0.12;
            }
            .hero-card::after {
                content: "";
                position: absolute;
                inset: 0;
                background: linear-gradient(135deg, rgba(108, 99, 255, 0.3), rgba(56, 189, 248, 0.15));
            }
            .hero-content {
                position: relative;
                z-index: 1;
            }
            .hero-greeting {
                font-size: 13px;
                color: rgba(255, 255, 255, 0.6);
                margin-bottom: 4px;
            }
            .hero-name {
                font-family: var(--font2);
                font-size: 24px;
                font-weight: 700;
                margin-bottom: 16px;
            }
            .hero-name span {
                color: var(--accent2);
            }
            .hero-time {
                font-size: 32px;
                font-family: var(--font2);
                font-weight: 800;
                letter-spacing: -1px;
            }
            .hero-date {
                font-size: 13px;
                color: rgba(255, 255, 255, 0.5);
                margin-top: 4px;
            }
            .hero-stats-row {
                display: flex;
                gap: 12px;
                margin-top: 16px;
            }
            .hero-stat {
                flex: 1;
                background: rgba(255, 255, 255, 0.08);
                border-radius: 12px;
                padding: 10px;
                text-align: center;
                border: 1px solid rgba(255, 255, 255, 0.1);
                backdrop-filter: blur(8px);
            }
            .hero-stat-val {
                font-family: var(--font2);
                font-size: 20px;
                font-weight: 700;
            }
            .hero-stat-lbl {
                font-size: 10px;
                color: rgba(255, 255, 255, 0.5);
                margin-top: 2px;
                text-transform: uppercase;
                letter-spacing: 0.5px;
            }

            /* ============ STAT GRID ============ */
            .stat-grid {
                display: grid;
                grid-template-columns: 1fr 1fr;
                gap: 12px;
                margin-bottom: 20px;
            }
            .stat-card {
                background: var(--glass2);
                border: 1px solid var(--border);
                border-radius: var(--radius);
                padding: 18px;
                position: relative;
                overflow: hidden;
                backdrop-filter: blur(20px);
                transition: all 0.2s;
            }
            .stat-card:active {
                transform: scale(0.97);
            }
            .stat-card::before {
                content: "";
                position: absolute;
                top: 0;
                left: 0;
                right: 0;
                height: 2px;
                border-radius: var(--radius) var(--radius) 0 0;
            }
            .stat-card.c1::before {
                background: linear-gradient(90deg, var(--accent), var(--accent2));
            }
            .stat-card.c2::before {
                background: linear-gradient(90deg, var(--green), #4ade80);
            }
            .stat-card.c3::before {
                background: linear-gradient(90deg, var(--red), #f472b6);
            }
            .stat-card.c4::before {
                background: linear-gradient(90deg, var(--orange), var(--yellow));
            }
            .stat-icon {
                width: 36px;
                height: 36px;
                border-radius: 10px;
                display: flex;
                align-items: center;
                justify-content: center;
                margin-bottom: 12px;
            }
            .stat-card.c1 .stat-icon {
                background: rgba(108, 99, 255, 0.15);
                color: var(--accent2);
            }
            .stat-card.c2 .stat-icon {
                background: rgba(34, 211, 165, 0.15);
                color: var(--green);
            }
            .stat-card.c3 .stat-icon {
                background: rgba(248, 113, 113, 0.15);
                color: var(--red);
            }
            .stat-card.c4 .stat-icon {
                background: rgba(251, 146, 60, 0.15);
                color: var(--orange);
            }
            .stat-val {
                font-family: var(--font2);
                font-size: 28px;
                font-weight: 800;
                letter-spacing: -1px;
                transition: all 0.5s;
            }
            .stat-label {
                font-size: 12px;
                color: var(--text2);
                margin-top: 4px;
                font-weight: 400;
            }
            .stat-change {
                font-size: 11px;
                margin-top: 6px;
            }
            .stat-change.up {
                color: var(--green);
            }
            .stat-change.down {
                color: var(--red);
            }

            /* ============ GLASS CARDS ============ */
            .glass-card {
                background: var(--glass2);
                border: 1px solid var(--border);
                border-radius: var(--radius);
                backdrop-filter: blur(20px);
                overflow: hidden;
            }
            .glass-card-header {
                padding: 16px 18px;
                border-bottom: 1px solid var(--border);
                display: flex;
                align-items: center;
                justify-content: space-between;
            }
            .glass-card-title {
                font-family: var(--font2);
                font-size: 15px;
                font-weight: 600;
            }
            .glass-card-body {
                padding: 16px 18px;
            }

            /* ============ CUSTOMER CARDS ============ */
            .customers-grid {
                display: flex;
                flex-direction: column;
                gap: 12px;
            }
            .customer-card {
                background: var(--glass2);
                border: 1px solid var(--border);
                border-radius: var(--radius);
                backdrop-filter: blur(20px);
                overflow: hidden;
                transition: all 0.25s;
                cursor: pointer;
            }
            .customer-card:active {
                transform: scale(0.98);
                border-color: var(--border2);
            }
            .customer-card-top {
                padding: 14px 16px;
                display: flex;
                align-items: center;
                gap: 12px;
            }
            .customer-avatar {
                width: 46px;
                height: 46px;
                border-radius: 14px;
                object-fit: cover;
                flex-shrink: 0;
                background: linear-gradient(135deg, var(--accent), var(--accent3));
                display: flex;
                align-items: center;
                justify-content: center;
                font-family: var(--font2);
                font-size: 16px;
                font-weight: 700;
                color: #fff;
            }
            .customer-info {
                flex: 1;
                min-width: 0;
            }
            .customer-name {
                font-weight: 600;
                font-size: 15px;
                white-space: nowrap;
                overflow: hidden;
                text-overflow: ellipsis;
            }
            .customer-phone {
                font-size: 12px;
                color: var(--text2);
                margin-top: 2px;
            }
            .customer-meta {
                display: flex;
                gap: 6px;
                align-items: center;
                margin-top: 4px;
            }
            .badge {
                padding: 3px 8px;
                border-radius: 6px;
                font-size: 10px;
                font-weight: 600;
                text-transform: uppercase;
                letter-spacing: 0.5px;
            }
            .badge.active {
                background: rgba(34, 211, 165, 0.15);
                color: var(--green);
                border: 1px solid rgba(34, 211, 165, 0.25);
            }
            .badge.inactive {
                background: rgba(248, 113, 113, 0.15);
                color: var(--red);
                border: 1px solid rgba(248, 113, 113, 0.25);
            }
            .badge.premium {
                background: rgba(251, 191, 36, 0.15);
                color: var(--yellow);
                border: 1px solid rgba(251, 191, 36, 0.25);
            }
            .badge.basic {
                background: rgba(108, 99, 255, 0.15);
                color: var(--accent2);
                border: 1px solid rgba(108, 99, 255, 0.25);
            }
            .customer-arrow {
                color: var(--text3);
                flex-shrink: 0;
            }
            .customer-progress {
                padding: 0 16px 14px;
            }
            .progress-row {
                display: flex;
                justify-content: space-between;
                font-size: 12px;
                color: var(--text2);
                margin-bottom: 6px;
            }
            .progress-bar {
                height: 6px;
                background: rgba(255, 255, 255, 0.06);
                border-radius: 3px;
                overflow: hidden;
            }
            .progress-fill {
                height: 100%;
                border-radius: 3px;
                transition: width 0.8s cubic-bezier(0.25, 0.46, 0.45, 0.94);
            }
            .progress-fill.high {
                background: linear-gradient(90deg, var(--green), #4ade80);
            }
            .progress-fill.mid {
                background: linear-gradient(90deg, var(--yellow), var(--orange));
            }
            .progress-fill.low {
                background: linear-gradient(90deg, var(--red), #f472b6);
            }

            /* ============ SEARCH & FILTERS ============ */
            .search-bar {
                display: flex;
                align-items: center;
                gap: 10px;
                background: var(--glass2);
                border: 1px solid var(--border);
                border-radius: var(--radius3);
                padding: 12px 14px;
                margin-bottom: 14px;
                backdrop-filter: blur(20px);
            }
            .search-bar input {
                flex: 1;
                background: none;
                border: none;
                outline: none;
                color: var(--text);
                font-family: var(--font);
                font-size: 14px;
            }
            .search-bar input::placeholder {
                color: var(--text3);
            }
            .filter-row {
                display: flex;
                gap: 8px;
                margin-bottom: 16px;
                overflow-x: auto;
                padding-bottom: 4px;
            }
            .filter-row::-webkit-scrollbar {
                display: none;
            }
            .filter-chip {
                padding: 7px 14px;
                border-radius: 20px;
                font-size: 12px;
                font-weight: 500;
                background: var(--surface);
                border: 1px solid var(--border);
                color: var(--text2);
                cursor: pointer;
                white-space: nowrap;
                transition: all 0.2s;
                flex-shrink: 0;
            }
            .filter-chip.active {
                background: rgba(108, 99, 255, 0.15);
                border-color: rgba(108, 99, 255, 0.4);
                color: var(--accent2);
            }

            /* ============ CUSTOMER MODAL ============ */
            .modal-overlay {
                position: fixed;
                inset: 0;
                z-index: 500;
                background: rgba(0, 0, 0, 0.6);
                backdrop-filter: blur(8px);
                display: none;
                align-items: flex-end;
                justify-content: center;
            }
            .modal-overlay.open {
                display: flex;
            }
            .modal-sheet {
                width: 100%;
                max-width: 500px;
                background: var(--bg2);
                border-radius: 28px 28px 0 0;
                padding: 0 0 env(safe-area-inset-bottom, 0);
                border: 1px solid var(--border);
                border-bottom: none;
                max-height: 90vh;
                overflow-y: auto;
                animation: sheetUp 0.35s cubic-bezier(0.34, 1.36, 0.64, 1);
            }
            @keyframes sheetUp {
                from {
                    transform: translateY(100%);
                }
                to {
                    transform: translateY(0);
                }
            }
            .modal-handle {
                width: 40px;
                height: 4px;
                background: var(--border2);
                border-radius: 2px;
                margin: 12px auto 0;
            }
            .modal-header {
                padding: 20px 20px 16px;
                border-bottom: 1px solid var(--border);
            }
            .modal-customer-hero {
                display: flex;
                align-items: center;
                gap: 14px;
            }
            .modal-avatar {
                width: 60px;
                height: 60px;
                border-radius: 18px;
                background: linear-gradient(135deg, var(--accent), var(--accent3));
                display: flex;
                align-items: center;
                justify-content: center;
                font-family: var(--font2);
                font-size: 22px;
                font-weight: 700;
                color: #fff;
                box-shadow: 0 8px 20px rgba(108, 99, 255, 0.3);
            }
            .modal-name {
                font-family: var(--font2);
                font-size: 20px;
                font-weight: 700;
            }
            .modal-sub {
                font-size: 13px;
                color: var(--text2);
                margin-top: 4px;
            }
            .modal-body {
                padding: 20px;
            }
            .modal-info-grid {
                display: grid;
                grid-template-columns: 1fr 1fr;
                gap: 12px;
                margin-bottom: 20px;
            }
            .modal-info-item {
                background: var(--surface);
                border-radius: var(--radius3);
                padding: 14px;
            }
            .modal-info-label {
                font-size: 11px;
                text-transform: uppercase;
                letter-spacing: 0.5px;
                color: var(--text3);
                margin-bottom: 6px;
            }
            .modal-info-val {
                font-family: var(--font2);
                font-size: 16px;
                font-weight: 600;
            }
            .modal-address {
                background: var(--surface);
                border-radius: var(--radius3);
                padding: 14px;
                margin-bottom: 20px;
            }
            .modal-ring-section {
                display: flex;
                justify-content: center;
                margin-bottom: 20px;
            }
            .ring-container {
                text-align: center;
            }
            .ring-svg {
                transform: rotate(-90deg);
            }
            .ring-bg {
                fill: none;
                stroke: rgba(255, 255, 255, 0.06);
                stroke-width: 8;
            }
            .ring-fill {
                fill: none;
                stroke-width: 8;
                stroke-linecap: round;
                transition: stroke-dashoffset 1s cubic-bezier(0.25, 0.46, 0.45, 0.94);
            }
            .ring-center {
                position: relative;
            }
            .ring-label {
                margin-top: 8px;
                font-size: 13px;
                color: var(--text2);
            }
            .ring-text-val {
                font-family: var(--font2);
                font-size: 26px;
                font-weight: 800;
                margin-top: 4px;
                text-align: center;
            }
            .modal-actions {
                display: grid;
                grid-template-columns: 1fr 1fr;
                gap: 10px;
            }
            .action-btn {
                display: flex;
                align-items: center;
                justify-content: center;
                gap: 8px;
                padding: 14px;
                border-radius: var(--radius3);
                font-family: var(--font);
                font-size: 14px;
                font-weight: 600;
                cursor: pointer;
                border: none;
                transition: all 0.2s;
            }
            .action-btn.wa {
                background: rgba(34, 197, 94, 0.15);
                color: #4ade80;
                border: 1px solid rgba(34, 197, 94, 0.25);
            }
            .action-btn.call {
                background: rgba(56, 189, 248, 0.15);
                color: var(--accent3);
                border: 1px solid rgba(56, 189, 248, 0.25);
            }
            .action-btn.copy {
                background: var(--surface);
                color: var(--text2);
                border: 1px solid var(--border);
            }
            .action-btn.share {
                background: rgba(167, 139, 250, 0.15);
                color: var(--accent2);
                border: 1px solid rgba(167, 139, 250, 0.25);
            }
            .action-btn:active {
                transform: scale(0.96);
            }
            .modal-close-btn {
                width: 100%;
                padding: 16px;
                background: var(--surface);
                border: 1px solid var(--border);
                border-radius: var(--radius3);
                color: var(--text2);
                font-family: var(--font);
                font-size: 14px;
                cursor: pointer;
                margin-top: 12px;
            }

            /* ============ ANALYTICS ============ */
            .analytics-banner {
                border-radius: var(--radius);
                overflow: hidden;
                margin-bottom: 20px;
                position: relative;
                background: linear-gradient(135deg, #0a0a2e, #1a0a2e);
                border: 1px solid rgba(108, 99, 255, 0.2);
                min-height: 120px;
                display: flex;
                align-items: center;
                padding: 20px;
            }
            .analytics-banner::before {
                content: "";
                position: absolute;
                inset: 0;
                background: url("https://images.unsplash.com/photo-1551288049-bebda4e38f71?w=800&q=80") center/cover;
                opacity: 0.1;
            }
            .analytics-banner-content {
                position: relative;
                z-index: 1;
            }
            .analytics-banner-title {
                font-family: var(--font2);
                font-size: 20px;
                font-weight: 700;
                margin-bottom: 6px;
            }
            .analytics-banner-sub {
                font-size: 13px;
                color: rgba(255, 255, 255, 0.5);
            }
            .chart-area {
                position: relative;
                height: 160px;
            }
            .bar-chart {
                display: flex;
                align-items: flex-end;
                gap: 8px;
                height: 140px;
                padding: 0 4px;
            }
            .bar-wrap {
                flex: 1;
                display: flex;
                flex-direction: column;
                align-items: center;
                gap: 6px;
            }
            .bar {
                width: 100%;
                border-radius: 6px 6px 0 0;
                background: linear-gradient(180deg, var(--accent), rgba(108, 99, 255, 0.3));
                transition: height 0.8s cubic-bezier(0.25, 0.46, 0.45, 0.94);
                min-height: 4px;
            }
            .bar.active-bar {
                background: linear-gradient(180deg, var(--green), rgba(34, 211, 165, 0.3));
            }
            .bar-name {
                font-size: 9px;
                color: var(--text3);
                text-overflow: ellipsis;
                overflow: hidden;
                white-space: nowrap;
                max-width: 100%;
            }
            .pie-section {
                display: flex;
                align-items: center;
                gap: 20px;
                padding: 16px;
            }
            .pie-wrap {
                flex-shrink: 0;
            }
            .pie-legends {
                flex: 1;
            }
            .pie-legend {
                display: flex;
                align-items: center;
                gap: 8px;
                margin-bottom: 10px;
            }
            .pie-dot {
                width: 10px;
                height: 10px;
                border-radius: 3px;
                flex-shrink: 0;
            }
            .pie-leg-label {
                font-size: 13px;
                color: var(--text2);
                flex: 1;
            }
            .pie-leg-val {
                font-family: var(--font2);
                font-size: 15px;
                font-weight: 600;
            }
            .top-users-list {
                display: flex;
                flex-direction: column;
                gap: 10px;
                padding: 0 18px 18px;
            }
            .top-user-row {
                display: flex;
                align-items: center;
                gap: 12px;
            }
            .top-user-rank {
                font-family: var(--font2);
                font-size: 20px;
                font-weight: 800;
                color: var(--text3);
                width: 24px;
            }
            .top-user-info {
                flex: 1;
            }
            .top-user-name {
                font-size: 14px;
                font-weight: 500;
            }
            .top-user-used {
                font-size: 12px;
                color: var(--text2);
            }
            .top-user-bar {
                flex-shrink: 0;
                width: 60px;
            }

            /* ============ NOTIFICATIONS ============ */
            .notif-list {
                display: flex;
                flex-direction: column;
                gap: 10px;
            }
            .notif-card {
                background: var(--glass2);
                border: 1px solid var(--border);
                border-radius: var(--radius2);
                padding: 14px 16px;
                display: flex;
                gap: 12px;
                align-items: flex-start;
                backdrop-filter: blur(20px);
            }
            .notif-icon-wrap {
                width: 38px;
                height: 38px;
                border-radius: 11px;
                display: flex;
                align-items: center;
                justify-content: center;
                flex-shrink: 0;
            }
            .notif-icon-wrap.warn {
                background: rgba(251, 191, 36, 0.15);
                color: var(--yellow);
            }
            .notif-icon-wrap.danger {
                background: rgba(248, 113, 113, 0.15);
                color: var(--red);
            }
            .notif-icon-wrap.info {
                background: rgba(56, 189, 248, 0.15);
                color: var(--accent3);
            }
            .notif-icon-wrap.success {
                background: rgba(34, 211, 165, 0.15);
                color: var(--green);
            }
            .notif-title {
                font-size: 14px;
                font-weight: 500;
            }
            .notif-body {
                font-size: 13px;
                color: var(--text2);
                margin-top: 3px;
                line-height: 1.4;
            }
            .notif-time {
                font-size: 11px;
                color: var(--text3);
                margin-top: 5px;
            }

            /* ============ PROFILE ============ */
            .profile-hero {
                border-radius: var(--radius);
                overflow: hidden;
                margin-bottom: 20px;
                position: relative;
                background: linear-gradient(135deg, #0d1a0a, #0a0a2e);
                border: 1px solid var(--border);
                padding: 28px 20px;
                text-align: center;
            }
            .profile-hero::before {
                content: "";
                position: absolute;
                inset: 0;
                background: url("https://images.unsplash.com/photo-1614850523011-8f49ffc73908?w=800&q=80") center/cover;
                opacity: 0.08;
            }
            .profile-avatar {
                width: 80px;
                height: 80px;
                border-radius: 24px;
                background: linear-gradient(135deg, var(--accent), var(--accent3));
                display: flex;
                align-items: center;
                justify-content: center;
                font-family: var(--font2);
                font-size: 28px;
                font-weight: 800;
                color: #fff;
                margin: 0 auto 14px;
                box-shadow: 0 12px 30px rgba(108, 99, 255, 0.35);
                position: relative;
                z-index: 1;
            }
            .profile-name {
                font-family: var(--font2);
                font-size: 22px;
                font-weight: 700;
                position: relative;
                z-index: 1;
            }
            .profile-role {
                font-size: 13px;
                color: var(--text2);
                margin-top: 4px;
                position: relative;
                z-index: 1;
            }
            .profile-badge {
                display: inline-block;
                margin-top: 10px;
                padding: 4px 14px;
                border-radius: 20px;
                font-size: 12px;
                font-weight: 600;
                background: rgba(108, 99, 255, 0.15);
                color: var(--accent2);
                border: 1px solid rgba(108, 99, 255, 0.3);
                position: relative;
                z-index: 1;
            }
            .setting-group {
                margin-bottom: 20px;
            }
            .setting-group-title {
                font-size: 11px;
                text-transform: uppercase;
                letter-spacing: 1px;
                color: var(--text3);
                margin-bottom: 10px;
                padding: 0 4px;
            }
            .setting-item {
                display: flex;
                align-items: center;
                gap: 14px;
                padding: 14px 16px;
                background: var(--glass2);
                border: 1px solid var(--border);
                border-radius: var(--radius2);
                margin-bottom: 8px;
                cursor: pointer;
                transition: all 0.2s;
                backdrop-filter: blur(20px);
            }
            .setting-item:active {
                background: var(--surface2);
            }
            .setting-icon {
                width: 36px;
                height: 36px;
                border-radius: 10px;
                display: flex;
                align-items: center;
                justify-content: center;
                flex-shrink: 0;
            }
            .setting-text {
                flex: 1;
            }
            .setting-label {
                font-size: 14px;
                font-weight: 500;
            }
            .setting-sub {
                font-size: 12px;
                color: var(--text2);
                margin-top: 2px;
            }
            .setting-right {
                color: var(--text3);
            }
            .logout-btn {
                width: 100%;
                padding: 16px;
                border-radius: var(--radius2);
                background: rgba(248, 113, 113, 0.1);
                border: 1px solid rgba(248, 113, 113, 0.25);
                color: var(--red);
                font-family: var(--font);
                font-size: 15px;
                font-weight: 600;
                cursor: pointer;
                display: flex;
                align-items: center;
                justify-content: center;
                gap: 8px;
                transition: all 0.2s;
            }
            .logout-btn:active {
                transform: scale(0.98);
            }

            /* ============ SKELETON ============ */
            .skeleton {
                background: linear-gradient(90deg, var(--surface) 25%, var(--surface2) 50%, var(--surface) 75%);
                background-size: 200% 100%;
                animation: shimmer 1.5s infinite;
                border-radius: 8px;
            }
            @keyframes shimmer {
                0% {
                    background-position: 200% 0;
                }
                100% {
                    background-position: -200% 0;
                }
            }
            .skeleton-card {
                height: 100px;
                border-radius: var(--radius);
                margin-bottom: 12px;
            }

            /* ============ EMPTY STATE ============ */
            .empty-state {
                text-align: center;
                padding: 60px 20px;
            }
            .empty-icon {
                font-size: 48px;
                margin-bottom: 14px;
                opacity: 0.4;
            }
            .empty-title {
                font-family: var(--font2);
                font-size: 18px;
                font-weight: 600;
                margin-bottom: 8px;
            }
            .empty-sub {
                font-size: 14px;
                color: var(--text2);
            }

            /* ============ TOAST ============ */
            .toast {
                position: fixed;
                bottom: calc(var(--nav-h) + 16px);
                left: 50%;
                transform: translateX(-50%);
                background: rgba(30, 30, 50, 0.95);
                border: 1px solid var(--border2);
                border-radius: 14px;
                padding: 12px 20px;
                font-size: 13px;
                color: var(--text);
                backdrop-filter: blur(20px);
                z-index: 600;
                white-space: nowrap;
                animation: toastIn 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
                box-shadow: var(--shadow);
            }
            @keyframes toastIn {
                from {
                    opacity: 0;
                    transform: translateX(-50%) translateY(20px);
                }
                to {
                    opacity: 1;
                    transform: translateX(-50%) translateY(0);
                }
            }

            /* ============ REFRESH FAB ============ */
            .fab {
                position: fixed;
                bottom: calc(var(--nav-h) + 20px);
                right: 20px;
                z-index: 90;
                width: 52px;
                height: 52px;
                border-radius: 16px;
                background: linear-gradient(135deg, var(--accent), #8b5cf6);
                display: flex;
                align-items: center;
                justify-content: center;
                box-shadow: 0 8px 24px rgba(108, 99, 255, 0.4);
                cursor: pointer;
                border: none;
                color: #fff;
                transition: all 0.3s;
            }
            .fab:active {
                transform: scale(0.92);
            }
            .fab.spinning svg {
                animation: spin 0.8s linear infinite;
            }
            @keyframes spin {
                to {
                    transform: rotate(360deg);
                }
            }

            /* ============ DELIVERY BANNER ============ */
            .delivery-banner {
                border-radius: var(--radius);
                overflow: hidden;
                margin-bottom: 20px;
                position: relative;
                background: linear-gradient(135deg, #0a1a2e, #0a2e1a);
                border: 1px solid rgba(56, 189, 248, 0.2);
                padding: 20px;
                display: flex;
                align-items: center;
                gap: 16px;
            }
            .delivery-banner::before {
                content: "";
                position: absolute;
                inset: 0;
                background: url("https://images.unsplash.com/photo-1586528116311-ad8dd3c8310d?w=800&q=80") center/cover;
                opacity: 0.1;
            }
            .delivery-banner-icon {
                position: relative;
                z-index: 1;
                flex-shrink: 0;
            }
            .delivery-banner-text {
                position: relative;
                z-index: 1;
            }
            .delivery-banner-title {
                font-family: var(--font2);
                font-size: 18px;
                font-weight: 700;
                margin-bottom: 4px;
            }
            .delivery-banner-sub {
                font-size: 12px;
                color: rgba(255, 255, 255, 0.5);
            }
            .delivery-banner-val {
                font-family: var(--font2);
                font-size: 32px;
                font-weight: 800;
                color: var(--accent3);
                position: relative;
                z-index: 1;
                margin-left: auto;
            }

            /* ============ INLINE SVG HELPERS ============ */
            svg {
                display: inline-block;
                vertical-align: middle;
            }

            .count-up {
                transition: all 0.3s;
            }
        </style>
    </head>
    <body>
        <div class="bg-mesh"></div>
        <div class="bg-orb bg-orb1"></div>
        <div class="bg-orb bg-orb2"></div>

        <!-- ============ LOGIN SCREEN ============ -->
        <div id="login-screen">
            <div class="login-card">
                <div class="login-logo">
                    <div class="login-logo-icon">
                        <svg
                            width="22"
                            height="22"
                            viewBox="0 0 24 24"
                            fill="none"
                            stroke="#fff"
                            stroke-width="2"
                            stroke-linecap="round"
                            stroke-linejoin="round"
                        >
                            <circle cx="12" cy="12" r="3" />
                            <path d="M3 12h3M18 12h3M12 3v3M12 18v3" />
                            <path d="m5.6 5.6 2.1 2.1M16.3 16.3l2.1 2.1M5.6 18.4l2.1-2.1M16.3 7.7l2.1-2.1" />
                        </svg>
                    </div>
                    <div class="login-logo-text">Mana <span>Hub</span></div>
                </div>
                <div class="login-title">Welcome Back 👋</div>
                <div class="login-sub">Sign in to manage your subscriptions</div>
                <div id="login-error" class="login-error">Invalid credentials. Please try again.</div>
                <div class="input-group">
                    <label>Username</label>
                    <input type="text" id="login-user" placeholder="Enter username" autocomplete="username" />
                    <div class="input-icon">
                        <svg
                            width="16"
                            height="16"
                            viewBox="0 0 24 24"
                            fill="none"
                            stroke="currentColor"
                            stroke-width="2"
                            stroke-linecap="round"
                            stroke-linejoin="round"
                        >
                            <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2" />
                            <circle cx="12" cy="7" r="4" />
                        </svg>
                    </div>
                </div>
                <div class="input-group">
                    <label>Password</label>
                    <input
                        type="password"
                        id="login-pass"
                        placeholder="Enter password"
                        autocomplete="current-password"
                    />
                    <div class="input-icon" onclick="togglePwd()">
                        <svg
                            id="eye-icon"
                            width="16"
                            height="16"
                            viewBox="0 0 24 24"
                            fill="none"
                            stroke="currentColor"
                            stroke-width="2"
                            stroke-linecap="round"
                            stroke-linejoin="round"
                        >
                            <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z" />
                            <circle cx="12" cy="12" r="3" />
                        </svg>
                    </div>
                </div>
                <div class="remember-row">
                    <input type="checkbox" id="remember-me" checked />
                    <label for="remember-me">Remember me</label>
                </div>
                <button class="login-btn" id="login-btn" onclick="doLogin()">Sign In</button>
            </div>
        </div>

        <!-- ============ MAIN APP ============ -->
        <div id="app" style="display: none">
            <!-- Top Bar -->
            <div id="topbar">
                <div class="topbar-logo">
                    <div class="topbar-logo-icon">
                        <svg
                            width="18"
                            height="18"
                            viewBox="0 0 24 24"
                            fill="none"
                            stroke="#fff"
                            stroke-width="2"
                            stroke-linecap="round"
                            stroke-linejoin="round"
                        >
                            <circle cx="12" cy="12" r="3" />
                            <path d="M3 12h3M18 12h3M12 3v3M12 18v3" />
                        </svg>
                    </div>
                    <div class="topbar-logo-text">Mana <span>Hub</span></div>
                </div>
                <div class="topbar-right">
                    <div class="topbar-badge">
                        <div class="status-dot" id="api-status-dot"></div>
                        <span id="api-status-text" style="font-size: 11px">Live</span>
                    </div>
                    <div class="topbar-btn" onclick="refreshData()">
                        <svg
                            width="16"
                            height="16"
                            viewBox="0 0 24 24"
                            fill="none"
                            stroke="currentColor"
                            stroke-width="2"
                            stroke-linecap="round"
                            stroke-linejoin="round"
                        >

        <script>
            // ============ CONFIG ============
            const API_URL =
                "https://script.google.com/macros/s/AKfycbwja--cgkGoAzpgXftFeKtC7qbrYmhZzY1wTAtcGGEUPbXy_r83AEOLg7kzbfwhiK4/exec";
            const CREDS = { user: "ANIL JAKKULA", pass: "Anil.jakkula@handler" };
            let allCustomers = [];
            let filteredCustomers = [];
            let currentFilter = "all";
            let currentSearch = "";
            let clockInterval;

            // ============ AUTH ============
            function checkSession() {
                const s = localStorage.getItem("mh_session");
                if (s === "active") {
                    showApp();
                    return true;
                }
                return false;
            }

            function doLogin() {
                const u = document.getElementById("login-user").value.trim();
                const p = document.getElementById("login-pass").value;
                const btn = document.getElementById("login-btn");
                const err = document.getElementById("login-error");
                err.style.display = "none";
                btn.textContent = "Signing in…";
                btn.classList.add("loading");
                setTimeout(() => {
                    if (u === CREDS.user && p === CREDS.pass) {
                        if (document.getElementById("remember-me").checked)
                            localStorage.setItem("mh_session", "active");
                        showApp();
                    } else {
                        err.style.display = "block";
                        btn.textContent = "Sign In";
                        btn.classList.remove("loading");
                    }
                }, 800);
            }

            function showApp() {
                document.getElementById("login-screen").style.display = "none";
                document.getElementById("app").style.display = "block";
                startClock();
                loadData();
                renderProfile();
            }

            function logout() {
                localStorage.removeItem("mh_session");
                location.reload();
            }

            function togglePwd() {
                const inp = document.getElementById("login-pass");
                inp.type = inp.type === "password" ? "text" : "password";
            }

            // ============ CLOCK ============
            function startClock() {
                updateClock();
                clockInterval = setInterval(updateClock, 1000);
            }
            function updateClock() {
                const now = new Date();
                const h = String(now.getHours()).padStart(2, "0");
                const m = String(now.getMinutes()).padStart(2, "0");
                const s = String(now.getSeconds()).padStart(2, "0");
                const el = document.getElementById("live-clock");
                if (el) el.textContent = `${h}:${m}:${s}`;
                const de = document.getElementById("live-date");
                if (de)
                    de.textContent = now.toLocaleDateString("en-IN", {
                        weekday: "long",
                        day: "numeric",
                        month: "long",
                        year: "numeric",
                    });
            }

            // ============ API ============
            async function loadData() {
                setApiStatus("connecting");
                renderSkeletons();
                try {
                    const res = await fetch(API_URL, { mode: "cors" });
                    if (!res.ok) throw new Error("HTTP " + res.status);
                    const data = await res.json();
                    allCustomers = Array.isArray(data) ? data : data.data || [];
                    filteredCustomers = [...allCustomers];
                    setApiStatus("live");
                    renderAll();
                    showToast("✅ Data refreshed successfully");
                } catch (e) {
                    setApiStatus("error");
                    showToast("⚠️ Failed to load data. Retrying…");
                    setTimeout(loadData, 5000);
                }
            }

            function setApiStatus(state) {
                const dot = document.getElementById("api-status-dot");
                const txt = document.getElementById("api-status-text");
                if (!dot) return;
                if (state === "live") {
                    dot.style.background = "#22d3a5";
                    txt.textContent = "Live";
                } else if (state === "connecting") {
                    dot.style.background = "#fbbf24";
                    txt.textContent = "Loading";
                } else {
                    dot.style.background = "#f87171";
                    txt.textContent = "Offline";
                }
            }

            async function refreshData() {
                const fab = document.querySelector(".fab");
                if (fab) fab.classList.add("spinning");
                await loadData();
                if (fab) fab.classList.remove("spinning");
            }

            // ============ ANALYTICS HELPERS ============
            function stats() {
                const total = allCustomers.length;
                const active = allCustomers.filter((c) => c.status === "active").length;
                const inactive = allCustomers.filter((c) => c.status !== "active").length;
                const premium = allCustomers.filter((c) => (c.plan || "").toLowerCase() === "premium").length;
                const totalRem = allCustomers.reduce((a, c) => a + (parseInt(c.remaining) || 0), 0);
                const totalUsed = allCustomers.reduce((a, c) => a + (parseInt(c.used) || 0), 0);
                return { total, active, inactive, premium, totalRem, totalUsed };
            }

            // ============ RENDER ALL ============
            function renderAll() {
                renderHome();
                renderCustomers();
                renderAnalytics();
                renderNotifications();
            }

            // ============ HOME PAGE ============
            function renderHome() {
                const s = stats();
                const greeting = getGreeting();
                document.getElementById("page-home").innerHTML = `
    <div class="hero-card">
      <div class="hero-content">
        <div class="hero-greeting">${greeting} 👋</div>
        <div class="hero-name">Anil <span>Jakkula</span></div>
        <div class="hero-time" id="live-clock">--:--:--</div>
        <div class="hero-date" id="live-date"></div>
        <div class="hero-stats-row">
          <div class="hero-stat">
            <div class="hero-stat-val">${s.total}</div>
            <div class="hero-stat-lbl">Total</div>
          </div>
          <div class="hero-stat">
            <div class="hero-stat-val" style="color:#22d3a5">${s.active}</div>
            <div class="hero-stat-lbl">Active</div>
          </div>
          <div class="hero-stat">
            <div class="hero-stat-val" style="color:#6c63ff">${s.premium}</div>
            <div class="hero-stat-lbl">Premium</div>
          </div>
        </div>
      </div>
    </div>

    <div class="stat-grid">
      <div class="stat-card c1" onclick="showPage('customers',document.querySelector('[data-page=customers]'))">
        <div class="stat-icon"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg></div>
        <div class="stat-val" id="cnt-total">0</div>
        <div class="stat-label">Total Subscribers</div>
        <div class="stat-change up">↑ All members</div>
      </div>
      <div class="stat-card c2" onclick="applyFilter('active')">
        <div class="stat-icon"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/></svg></div>
        <div class="stat-val" id="cnt-active">0</div>
        <div class="stat-label">Active Users</div>
        <div class="stat-change up">↑ Currently active</div>
      </div>
      <div class="stat-card c3">
        <div class="stat-icon"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg></div>
        <div class="stat-val" id="cnt-inactive">0</div>
        <div class="stat-label">Expired</div>
        <div class="stat-change down">↓ Need renewal</div>
      </div>
      <div class="stat-card c4">
        <div class="stat-icon"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/></svg></div>
        <div class="stat-val" id="cnt-premium">0</div>
        <div class="stat-label">Premium Plans</div>
        <div class="stat-change up">↑ Premium members</div>
      </div>
    </div>

    <div class="delivery-banner">
      <div class="delivery-banner-icon">
        <svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="#38bdf8" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><rect x="1" y="3" width="15" height="13"/><polygon points="16 8 20 8 23 11 23 16 16 16 16 8"/><circle cx="5.5" cy="18.5" r="2.5"/><circle cx="18.5" cy="18.5" r="2.5"/></svg>
      </div>
      <div class="delivery-banner-text">
        <div class="delivery-banner-title">Total Deliveries</div>
        <div class="delivery-banner-sub">Remaining across all plans</div>
      </div>
      <div class="delivery-banner-val" id="cnt-remaining">0</div>
    </div>

    <div class="section-header">
      <div class="section-title">Recent Members</div>
      <div class="section-action" onclick="showPage('customers',document.querySelector('[data-page=customers]'))">View All →</div>
    </div>
    <div id="recent-customers"></div>

    <div style="height:10px"></div>
  `;

                startClock();
                updateClock();
                animateCounters(s);
                renderRecentCustomers();
            }

            function getGreeting() {
                const h = new Date().getHours();
                if (h < 12) return "Good Morning";
                if (h < 17) return "Good Afternoon";
                return "Good Evening";
            }

            function animateCounters(s) {
                animateNum("cnt-total", s.total);
                animateNum("cnt-active", s.active);
                animateNum("cnt-inactive", s.inactive);
                animateNum("cnt-premium", s.premium);
                animateNum("cnt-remaining", s.totalRem);
            }

            function animateNum(id, target) {
                const el = document.getElementById(id);
                if (!el) return;
                let current = 0;
                const step = Math.ceil(target / 30);
                const timer = setInterval(() => {
                    current = Math.min(current + step, target);
                    el.textContent = current;
                    if (current >= target) clearInterval(timer);
                }, 30);
            }

            function renderRecentCustomers() {
                const el = document.getElementById("recent-customers");
                if (!el) return;
                const recent = [...allCustomers]
                    .sort((a, b) => new Date(b.joined_date || 0) - new Date(a.joined_date || 0))
                    .slice(0, 3);
                el.innerHTML = recent.map((c) => customerCardHTML(c)).join("");
            }

            // ============ CUSTOMERS PAGE ============
            function renderCustomers() {
                document.getElementById("page-customers").innerHTML = `
    <div style="margin-top:8px">
      <div class="section-title" style="font-family:var(--font2);font-size:22px;font-weight:800;margin-bottom:16px">All Customers</div>
      <div class="search-bar">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="color:var(--text3)"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
        <input type="text" id="search-input" placeholder="Search name or phone…" oninput="doSearch(this.value)">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="color:var(--text3)"><line x1="4" y1="6" x2="20" y2="6"/><line x1="8" y1="12" x2="16" y2="12"/><line x1="11" y1="18" x2="13" y2="18"/></svg>
      </div>
      <div class="filter-row">
        <div class="filter-chip active" onclick="applyFilter('all',this)">All (${allCustomers.length})</div>
        <div class="filter-chip" onclick="applyFilter('active',this)">Active (${allCustomers.filter((c) => c.status === "active").length})</div>
        <div class="filter-chip" onclick="applyFilter('inactive',this)">Inactive (${allCustomers.filter((c) => c.status !== "active").length})</div>
        <div class="filter-chip" onclick="applyFilter('premium',this)">Premium (${allCustomers.filter((c) => (c.plan || "").toLowerCase() === "premium").length})</div>
        <div class="filter-chip" onclick="applyFilter('basic',this)">Basic (${allCustomers.filter((c) => (c.plan || "").toLowerCase() === "basic").length})</div>
      </div>
      <div id="customers-count" style="font-size:13px;color:var(--text2);margin-bottom:12px">Showing ${allCustomers.length} customers</div>
      <div class="customers-grid" id="customers-list"></div>
    </div>
  `;
                renderCustomerList();
            }

            function renderCustomerList() {
                const el = document.getElementById("customers-list");
                if (!el) return;
                if (filteredCustomers.length === 0) {
                    el.innerHTML = `<div class="empty-state"><div class="empty-icon">🔍</div><div class="empty-title">No customers found</div><div class="empty-sub">Try adjusting your search or filters</div></div>`;
                    return;
                }
                el.innerHTML = filteredCustomers.map((c) => customerCardHTML(c)).join("");
                const cnt = document.getElementById("customers-count");
                if (cnt)
                    cnt.textContent = `Showing ${filteredCustomers.length} customer${filteredCustomers.length !== 1 ? "s" : ""}`;
            }

            function customerCardHTML(c) {
                const used = parseInt(c.used) || 0;
                const remaining = parseInt(c.remaining) || 0;
                const total = used + remaining;
                const pct = total > 0 ? Math.round((remaining / total) * 100) : 0;
                const fillClass = pct > 50 ? "high" : pct > 20 ? "mid" : "low";
                const initials = (c.name || "?")
                    .split(" ")
                    .map((w) => w[0])
                    .join("")
                    .toUpperCase()
                    .slice(0, 2);
                const avatarColors = [
                    "linear-gradient(135deg,#6c63ff,#a78bfa)",
                    "linear-gradient(135deg,#22d3a5,#38bdf8)",
                    "linear-gradient(135deg,#f472b6,#fb923c)",
                    "linear-gradient(135deg,#38bdf8,#6c63ff)",
                ];
                const color = avatarColors[(c.id || 0) % avatarColors.length];
                return `
    <div class="customer-card" onclick="openCustomer(${c.id})">
      <div class="customer-card-top">
        <div class="customer-avatar" style="background:${color}">${initials}</div>
        <div class="customer-info">
          <div class="customer-name">${c.name || "Unknown"}</div>
          <div class="customer-phone">📞 ${c.phone || "—"}</div>
          <div class="customer-meta">
            <span class="badge ${c.status === "active" ? "active" : "inactive"}">${c.status || "unknown"}</span>
            <span class="badge ${(c.plan || "").toLowerCase() === "premium" ? "premium" : "basic"}">${c.plan || "—"}</span>
          </div>
        </div>
        <div class="customer-arrow">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="9 18 15 12 9 6"/></svg>
        </div>
      </div>
      <div class="customer-progress">
        <div class="progress-row">
          <span>Remaining: ${remaining} deliveries</span>
          <span>${pct}%</span>
        </div>
        <div class="progress-bar">
          <div class="progress-fill ${fillClass}" style="width:${pct}%"></div>
        </div>
      </div>
    </div>`;
            }

            function doSearch(val) {
                currentSearch = val.toLowerCase();
                applyFilters();
            }

            function applyFilter(type, el) {
                currentFilter = type;
                document.querySelectorAll(".filter-chip").forEach((c) => c.classList.remove("active"));
                if (el) el.classList.add("active");
                applyFilters();
            }

            function applyFilters() {
                filteredCustomers = allCustomers.filter((c) => {
                    const matchSearch =
                        !currentSearch ||
                        (c.name || "").toLowerCase().includes(currentSearch) ||
                        (c.phone || "").includes(currentSearch);
                    let matchFilter = true;
                    if (currentFilter === "active") matchFilter = c.status === "active";
                    else if (currentFilter === "inactive") matchFilter = c.status !== "active";
                    else if (currentFilter === "premium") matchFilter = (c.plan || "").toLowerCase() === "premium";
                    else if (currentFilter === "basic") matchFilter = (c.plan || "").toLowerCase() === "basic";
                    return matchSearch && matchFilter;
                });
                renderCustomerList();
            }

            // ============ CUSTOMER MODAL ============
            function openCustomer(id) {
                const c = allCustomers.find((x) => x.id == id);
                if (!c) return;
                const used = parseInt(c.used) || 0;
                const remaining = parseInt(c.remaining) || 0;
                const total = used + remaining;
                const pct = total > 0 ? Math.round((remaining / total) * 100) : 0;
                const circumference = 314;
                const offset = circumference - (pct / 100) * circumference;
                const initials = (c.name || "?")
                    .split(" ")
                    .map((w) => w[0])
                    .join("")
                    .toUpperCase()
                    .slice(0, 2);
                const avatarColors = [
                    "linear-gradient(135deg,#6c63ff,#a78bfa)",
                    "linear-gradient(135deg,#22d3a5,#38bdf8)",
                    "linear-gradient(135deg,#f472b6,#fb923c)",
                    "linear-gradient(135deg,#38bdf8,#6c63ff)",
                ];
                const color = avatarColors[(c.id || 0) % avatarColors.length];

                document.getElementById("modal-avatar").textContent = initials;
                document.getElementById("modal-avatar").style.background = color;
                document.getElementById("modal-name").textContent = c.name || "Unknown";

            function generateAlerts() {
                const alerts = [];

                    const used = parseInt(c.used) || 0;
                    const total = rem + used;

                        alerts.push({
                            type: "danger",
                            icon: warnIcon(),
                            title: `${c.name} — No Deliveries Left!`,
                            body: `${c.phone} has used all ${total} deliveries. Renewal needed urgently.`,
                            time: "Action required",
                        });

                        alerts.push({
                            type: "warn",
                            icon: alertIcon(),
                            title: `${c.name} — Low Deliveries`,
                            body: `Only ${rem} deliveries remaining for ${c.phone}. Consider renewal soon.`,
                            time: "Low balance warning",

                            title: `${c.name} — Inactive`,
                            body: `${c.phone} subscription is inactive. Please check and reactivate.`,

                    }

                        icon: checkIcon(),
                        title: "Data Sync Successful",

            <div class="setting-sub">Version 2.0 · Premium</div>
          </div>
        </div>
      </div>

      <button class="logout-btn" onclick="logout()">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>
        Sign Out
      </button>
      <div style="height:20px"></div>
    </div>
  `;
            }

            // ============ SKELETON LOADING ============
            function renderSkeletons() {
                const home = document.getElementById("page-home");
                if (home && home.innerHTML === "") {
                    home.innerHTML = `
      <div class="skeleton" style="height:180px;border-radius:24px;margin-bottom:20px;margin-top:8px"></div>
      <div class="stat-grid"><div class="skeleton skeleton-card"></div><div class="skeleton skeleton-card"></div><div class="skeleton skeleton-card"></div><div class="skeleton skeleton-card"></div></div>
      <div class="skeleton" style="height:80px;border-radius:20px;margin-bottom:20px"></div>
      <div class="skeleton skeleton-card"></div><div class="skeleton skeleton-card"></div>
    `;
                }
            }

            // ============ PAGE NAVIGATION ============
            function showPage(name, el) {
                document.querySelectorAll(".page").forEach((p) => p.classList.remove("active"));
                document.querySelectorAll(".nav-item").forEach((n) => n.classList.remove("active"));
                document.getElementById(`page-${name}`).classList.add("active");
                if (el) el.classList.add("active");
            }

            // ============ UTILS ============
            function formatDate(d) {
                if (!d) return "—";
                try {
                    return new Date(d).toLocaleDateString("en-IN", { day: "numeric", month: "short", year: "numeric" });
                } catch {
                    return d;
                }
            }

            let toastTimeout;
            function showToast(msg) {
                clearTimeout(toastTimeout);
                const old = document.querySelector(".toast");
                if (old) old.remove();
                const t = document.createElement("div");
                t.className = "toast";
                t.textContent = msg;
                document.body.appendChild(t);
                toastTimeout = setTimeout(() => t.remove(), 2500);
            }

            // ============ LOGIN ENTER KEY ============
            document.addEventListener("keydown", (e) => {
                if (e.key === "Enter" && document.getElementById("login-screen").style.display !== "none") doLogin();
            });

            // ============ INIT ============
            if (!checkSession()) {
                document.getElementById("app").style.display = "none";
            }
        </script>
    </body>
</html>
